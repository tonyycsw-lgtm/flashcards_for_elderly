<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>懷舊記憶卡 - 給香港長者的認知訓練</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 樣式保持不變，從之前的版本複製 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft JhengHei', 'Noto Sans TC', sans-serif;
        }
        
        body {
            background-color: #f0f4fa;
            color: #2d3748;
            line-height: 1.6;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
            font-size: 22px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 25px;
            padding: 30px 20px;
            background: linear-gradient(135deg, #4f46e5 0%, #7e5bef 100%);
            color: white;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.3);
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }
        
        .header .subtitle {
            font-size: 1.4rem;
            opacity: 0.9;
        }
        
        .category-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 30px;
            background-color: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.08);
            border: 3px solid #e0e7ff;
            justify-content: center;
            min-height: 100px;
        }
        
        .tab-btn {
            padding: 18px 28px;
            background-color: #eef2ff;
            color: #4f46e5;
            border: 3px solid #4f46e5;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1.3rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 180px;
            justify-content: center;
        }
        
        .tab-btn i {
            font-size: 1.5rem;
        }
        
        .tab-btn:hover {
            background-color: #e0e7ff;
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(79, 70, 229, 0.2);
        }
        
        .tab-btn.active {
            background-color: #4f46e5;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(79, 70, 229, 0.3);
        }
        
        .tab-btn.disabled {
            display: none; /* 隱藏沒有數據的分類 */
        }
        
        .category-content {
            background: white;
            border-radius: 25px;
            padding: 35px;
            margin-bottom: 30px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.06);
            border: 3px solid #e0e7ff;
            display: none;
        }
        
        .category-content.active {
            display: block;
            animation: fadeIn 0.6s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .category-title {
            font-size: 2rem;
            color: #4f46e5;
            border-bottom: 4px solid #7e5bef;
            padding-bottom: 15px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .category-title i {
            font-size: 2rem;
        }
        
        .category-desc {
            font-size: 1.4rem;
            color: #4a5568;
            margin-bottom: 30px;
            padding: 20px;
            background-color: #eef2ff;
            border-radius: 15px;
            border-left: 8px solid #4f46e5;
        }
        
        .flashcards-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            margin: 30px 0;
        }
        
        .flashcard {
            perspective: 1200px;
            height: 450px;
            cursor: pointer;
        }
        
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.8s;
            transform-style: preserve-3d;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
            border-radius: 25px;
        }
        
        .flashcard.flipped .card-inner {
            transform: rotateY(180deg);
        }
        
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .card-front {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
        }
        
        .card-front-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .card-category-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background-color: rgba(255, 255, 255, 0.2);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 1.1rem;
            backdrop-filter: blur(5px);
        }
        
        .card-word {
            font-size: 4rem;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.3);
        }
        
        .card-word-desc {
            font-size: 1.6rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 25px;
            background-color: rgba(255, 255, 255, 0.15);
            padding: 15px;
            border-radius: 15px;
        }
        
        .card-example {
            font-size: 1.3rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 10px;
            text-align: left;
            padding: 5px 15px;
            border-left: 4px solid rgba(255, 255, 255, 0.5);
        }
        
        .card-back {
            background: white;
            border: 3px solid #667eea;
            transform: rotateY(180deg);
            padding: 0;
        }
        
        .card-back-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .card-footer {
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5px;
        }
        
        .audio-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background-color: white;
            color: #667eea;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 2rem;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
            z-index: 10;
        }
        
        .audio-btn:hover {
            background-color: #f0f0f0;
            transform: scale(1.15);
        }
        
        .audio-btn.playing {
            background-color: #ef4444;
            color: white;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        
        .flip-hint {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .nav-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 40px 0 20px;
        }
        
        .nav-btn {
            padding: 15px 30px;
            border: 3px solid #4f46e5;
            border-radius: 15px;
            background-color: white;
            color: #4f46e5;
            font-size: 1.3rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .nav-btn:hover:not(:disabled) {
            background-color: #4f46e5;
            color: white;
            transform: translateY(-3px);
        }
        
        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background-color: #e2e8f0;
            border-color: #a0aec0;
            color: #718096;
        }
        
        .page-indicator {
            font-size: 1.5rem;
            font-weight: 600;
            color: #4a5568;
            padding: 15px 25px;
            background-color: #eef2ff;
            border-radius: 15px;
        }
        
        .lang-toggle {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #4f46e5;
            color: white;
            border: none;
            border-radius: 60px;
            padding: 18px 30px;
            font-size: 1.3rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(79, 70, 229, 0.4);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 100;
            transition: all 0.3s ease;
        }
        
        .lang-toggle:hover {
            background-color: #7e5bef;
            transform: scale(1.05);
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }
        
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #e0e7ff;
            border-top-color: #4f46e5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            font-size: 1.5rem;
            color: #4f46e5;
            font-weight: 600;
        }
        
        .loading-progress {
            margin-top: 10px;
            font-size: 1.2rem;
            color: #718096;
        }
        
        .no-data-message {
            text-align: center;
            padding: 50px;
            color: #718096;
            font-size: 1.5rem;
        }
        
        @media (max-width: 1024px) {
            .flashcards-grid { gap: 20px; }
            .flashcard { height: 400px; }
            .card-word { font-size: 3rem; }
        }
        
        @media (max-width: 768px) {
            body { padding: 15px; font-size: 18px; }
            .header h1 { font-size: 2rem; }
            .flashcards-grid { grid-template-columns: 1fr; }
            .tab-btn { min-width: 150px; padding: 15px 20px; font-size: 1.1rem; }
            .card-word { font-size: 2.5rem; }
            .lang-toggle { bottom: 20px; right: 20px; padding: 15px 25px; }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">正在加載記憶卡數據...</div>
        <div class="loading-progress" id="loadingProgress">準備中...</div>
    </div>

    <div class="header">
        <h1><i class="fas fa-heart"></i> 懷舊記憶卡</h1>
        <p class="subtitle">點擊卡片翻轉查看圖片 • 點擊喇叭聆聽發音</p>
    </div>
    
    <!-- 分類標籤容器（會動態生成） -->
    <div class="category-tabs" id="categoryTabs">
        <!-- 將由 JavaScript 動態生成 -->
    </div>
    
    <!-- 分類內容容器（會動態生成） -->
    <div id="categoryContents">
        <!-- 將由 JavaScript 動態生成 -->
    </div>
    
    <button class="lang-toggle" id="langToggle">
        <i class="fas fa-language"></i> <span>切換至普通話</span>
    </button>

    <script>
        // ========== 配置 ==========
        const CATEGORIES = [
            { id: 'food', name: '食物', icon: 'fa-apple-alt' },
            { id: 'color', name: '顏色', icon: 'fa-palette' },
            { id: 'clothing', name: '服裝', icon: 'fa-tshirt' },
            { id: 'toy', name: '玩具/遊戲', icon: 'fa-robot' },
            { id: 'transport', name: '交通工具', icon: 'fa-bus' },
            { id: 'vintage', name: '懷舊物品', icon: 'fa-clock' },
            { id: 'emotion', name: '情緒', icon: 'fa-smile' }
        ];
        
        // 初始化數據對象
        window.cardsData = {};
        CATEGORIES.forEach(cat => {
            window.cardsData[cat.id] = [];
        });
        console.log('數據系統已初始化');
        
        // 全局變數
        let currentAudio = null;
        let currentPlayingButton = null;
        let currentLanguage = 'cantonese';
        const CARDS_PER_PAGE = 5;
        let loadedCategories = 0;
        let availableCategories = []; // 存儲有數據的分類
        
        // 當前頁碼
        let currentPages = {};
        CATEGORIES.forEach(cat => {
            currentPages[cat.id] = 1;
        });
        
        // ========== 動態加載數據文件 ==========
        function loadCategoryData(category) {
            return new Promise((resolve) => {
                const script = document.createElement('script');
                script.src = `data/${category.id}.js`;
                
                script.onload = function() {
                    console.log(`✅ 成功加載: ${category.id}.js`);
                    loadedCategories++;
                    
                    // 檢查是否有數據
                    if (window.cardsData[category.id] && window.cardsData[category.id].length > 0) {
                        availableCategories.push(category);
                    }
                    
                    updateLoadingProgress();
                    resolve(true);
                };
                
                script.onerror = function() {
                    console.log(`⚠️ 文件不存在: ${category.id}.js (使用空數據)`);
                    loadedCategories++;
                    updateLoadingProgress();
                    resolve(false);
                };
                
                document.head.appendChild(script);
            });
        }
        
        // 更新加載進度
        function updateLoadingProgress() {
            const progress = document.getElementById('loadingProgress');
            progress.textContent = `已檢查 ${loadedCategories}/${CATEGORIES.length} 個分類`;
            
            if (loadedCategories === CATEGORIES.length) {
                // 所有文件都檢查完畢
                setTimeout(() => {
                    document.getElementById('loadingOverlay').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('loadingOverlay').style.display = 'none';
                    }, 500);
                }, 500);
                
                // 生成分類標籤和內容
                generateCategories();
            }
        }
        
        // ========== 生成分類標籤和內容 ==========
        function generateCategories() {
            const tabsContainer = document.getElementById('categoryTabs');
            const contentsContainer = document.getElementById('categoryContents');
            
            tabsContainer.innerHTML = '';
            contentsContainer.innerHTML = '';
            
            if (availableCategories.length === 0) {
                // 沒有任何數據
                tabsContainer.innerHTML = '<div style="padding: 30px; text-align: center;">暫無任何數據，請添加數據文件</div>';
                return;
            }
            
            // 為每個有數據的分類創建標籤和內容
            availableCategories.forEach((category, index) => {
                // 創建標籤按鈕
                const tabBtn = document.createElement('button');
                tabBtn.className = `tab-btn ${index === 0 ? 'active' : ''}`;
                tabBtn.dataset.category = category.id;
                tabBtn.innerHTML = `<i class="fas ${category.icon}"></i> ${category.name}`;
                tabsContainer.appendChild(tabBtn);
                
                // 創建內容區域
                const contentDiv = document.createElement('div');
                contentDiv.id = `category-${category.id}`;
                contentDiv.className = `category-content ${index === 0 ? 'active' : ''}`;
                contentDiv.innerHTML = `
                    <div class="category-title"><i class="fas ${category.icon}"></i> ${category.name}</div>
                    <div class="category-desc"><i class="fas fa-info-circle"></i> 點擊卡片翻轉看圖片 • 點擊喇叭聽發音</div>
                    <div class="flashcards-grid" id="${category.id}-cards"></div>
                    <div class="nav-controls">
                        <button class="nav-btn" id="${category.id}-prev" disabled><i class="fas fa-chevron-left"></i> 上一頁</button>
                        <div class="page-indicator" id="${category.id}-page">1/1</div>
                        <button class="nav-btn" id="${category.id}-next" disabled><i class="fas fa-chevron-right"></i> 下一頁</button>
                    </div>
                `;
                contentsContainer.appendChild(contentDiv);
            });
            
            // 綁定標籤事件
            bindTabEvents();
            
            // 綁定分頁事件
            bindPaginationEvents();
            
            // 渲染第一個分類
            if (availableCategories.length > 0) {
                renderCards(availableCategories[0].id, 1);
            }
        }
        
        // ========== 綁定標籤事件 ==========
        function bindTabEvents() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const category = this.dataset.category;
                    
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    
                    document.querySelectorAll('.category-content').forEach(c => c.classList.remove('active'));
                    document.getElementById(`category-${category}`).classList.add('active');
                    
                    if (window.cardsData[category] && window.cardsData[category].length > 0) {
                        renderCards(category, currentPages[category] || 1);
                    }
                });
            });
        }
        
        // ========== 綁定分頁事件 ==========
        function bindPaginationEvents() {
            availableCategories.forEach(category => {
                const prevBtn = document.getElementById(`${category.id}-prev`);
                const nextBtn = document.getElementById(`${category.id}-next`);
                
                if (prevBtn) {
                    prevBtn.addEventListener('click', () => {
                        if (currentPages[category.id] > 1) {
                            currentPages[category.id]--;
                            renderCards(category.id, currentPages[category.id]);
                        }
                    });
                }
                
                if (nextBtn) {
                    nextBtn.addEventListener('click', () => {
                        const cards = window.cardsData[category.id] || [];
                        const totalPages = Math.ceil(cards.length / CARDS_PER_PAGE);
                        if (currentPages[category.id] < totalPages) {
                            currentPages[category.id]++;
                            renderCards(category.id, currentPages[category.id]);
                        }
                    });
                }
            });
        }
        
        // ========== 渲染卡片 ==========
        function renderCards(categoryId, page) {
            const container = document.getElementById(`${categoryId}-cards`);
            if (!container) return;
            
            const cards = window.cardsData[categoryId] || [];
            
            if (cards.length === 0) {
                container.innerHTML = '<div class="no-data-message">此分類暫無卡片數據</div>';
                return;
            }
            
            const totalPages = Math.ceil(cards.length / CARDS_PER_PAGE);
            const startIndex = (page - 1) * CARDS_PER_PAGE;
            const endIndex = Math.min(startIndex + CARDS_PER_PAGE, cards.length);
            const pageCards = cards.slice(startIndex, endIndex);
            
            container.innerHTML = '';
            
            pageCards.forEach(card => {
                const audioPath = currentLanguage === 'cantonese' ? card.audioCantonese : card.audioMandarin;
                
                const categoryInfo = CATEGORIES.find(c => c.id === categoryId);
                
                const cardHtml = `
                    <div class="flashcard" data-category="${categoryId}">
                        <div class="card-inner">
                            <div class="card-front">
                                <div class="card-category-badge"><i class="fas ${categoryInfo.icon}"></i> ${categoryInfo.name}</div>
                                <div class="card-front-content">
                                    <div class="card-word">${card.word}</div>
                                    <div class="card-word-desc">${card.desc}</div>
                                    <div class="card-example"><i class="fas fa-quote-left"></i> ${card.example1}</div>
                                    <div class="card-example"><i class="fas fa-quote-right"></i> ${card.example2}</div>
                                </div>
                                <div class="card-footer">
                                    <button class="audio-btn" data-audio="${audioPath}">
                                        <i class="fas fa-volume-up"></i>
                                    </button>
                                    <div class="flip-hint"><i class="fas fa-sync-alt"></i> 點擊翻轉</div>
                                </div>
                            </div>
                            <div class="card-back">
                                <img src="${card.img || 'images/placeholder.png'}" alt="${card.word}" class="card-back-image" onerror="this.src='images/placeholder.png'">
                            </div>
                        </div>
                    </div>
                `;
                
                container.innerHTML += cardHtml;
            });
            
            // 更新頁碼
            const pageIndicator = document.getElementById(`${categoryId}-page`);
            if (pageIndicator) {
                pageIndicator.textContent = `${page}/${totalPages}`;
            }
            
            // 更新按鈕狀態
            const prevBtn = document.getElementById(`${categoryId}-prev`);
            const nextBtn = document.getElementById(`${categoryId}-next`);
            if (prevBtn) prevBtn.disabled = page <= 1;
            if (nextBtn) nextBtn.disabled = page >= totalPages;
            
            // 綁定卡片事件
            bindCardEvents();
        }
        
        // ========== 綁定卡片事件 ==========
        function bindCardEvents() {
            // 卡片翻轉
            document.querySelectorAll('.flashcard').forEach(card => {
                card.addEventListener('click', function(e) {
                    if (!e.target.closest('.audio-btn')) {
                        this.classList.toggle('flipped');
                    }
                });
            });
            
            // 音頻播放
            document.querySelectorAll('.audio-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const audioPath = this.dataset.audio;
                    
                    if (currentAudio && !currentAudio.paused && currentPlayingButton === this) {
                        currentAudio.pause();
                        this.classList.remove('playing');
                        this.innerHTML = '<i class="fas fa-volume-up"></i>';
                        currentPlayingButton = null;
                        return;
                    }
                    
                    if (currentAudio) {
                        currentAudio.pause();
                        if (currentPlayingButton) {
                            currentPlayingButton.classList.remove('playing');
                            currentPlayingButton.innerHTML = '<i class="fas fa-volume-up"></i>';
                        }
                    }
                    
                    this.classList.add('playing');
                    this.innerHTML = '<i class="fas fa-pause"></i>';
                    currentPlayingButton = this;
                    
                    try {
                        currentAudio = new Audio(audioPath);
                        currentAudio.play().catch(() => {
                            // 忽略自動播放錯誤
                        });
                        
                        currentAudio.onended = function() {
                            btn.classList.remove('playing');
                            btn.innerHTML = '<i class="fas fa-volume-up"></i>';
                            currentAudio = null;
                            currentPlayingButton = null;
                        };
                    } catch (error) {
                        console.log('音頻播放錯誤');
                        setTimeout(() => {
                            btn.classList.remove('playing');
                            btn.innerHTML = '<i class="fas fa-volume-up"></i>';
                            currentAudio = null;
                            currentPlayingButton = null;
                        }, 1000);
                    }
                });
            });
        }
        
        // ========== 語言切換 ==========
        document.getElementById('langToggle').addEventListener('click', function() {
            currentLanguage = currentLanguage === 'cantonese' ? 'mandarin' : 'cantonese';
            this.querySelector('span').textContent = currentLanguage === 'cantonese' ? '切換至普通話' : '切換至粵語';
            
            const activeTab = document.querySelector('.tab-btn.active');
            if (activeTab) {
                const categoryId = activeTab.dataset.category;
                renderCards(categoryId, currentPages[categoryId] || 1);
            }
        });
        
        // ========== 開始加載所有分類 ==========
        async function loadAllCategories() {
            for (const category of CATEGORIES) {
                await loadCategoryData(category);
            }
        }
        
        // 開始加載
        loadAllCategories();
    </script>
</body>
</html>

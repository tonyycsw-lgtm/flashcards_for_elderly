<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>懷舊記憶卡 - 給香港長者的認知訓練</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft JhengHei', 'Noto Sans TC', sans-serif;
        }
        
        body {
            background-color: #f0f4fa;
            color: #2d3748;
            line-height: 1.6;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
            font-size: 22px;
            transition: font-size 0.2s;
        }
        
        /* 超大字形體類別 */
        body.ultra-large {
            font-size: 28px;
        }
        body.ultra-large .header h1 { font-size: 3rem; }
        body.ultra-large .header .subtitle { font-size: 1.8rem; }
        body.ultra-large .tab-btn { font-size: 1.5rem; padding: 20px 30px; }
        body.ultra-large .card-word { font-size: 5rem; }
        body.ultra-large .card-word-desc { font-size: 2rem; }
        body.ultra-large .card-example { font-size: 1.6rem; }
        body.ultra-large .nav-btn { font-size: 1.6rem; }
        body.ultra-large .page-indicator { font-size: 1.8rem; }
        body.ultra-large .lang-toggle { font-size: 1.6rem; }
        
        .header {
            text-align: center;
            margin-bottom: 25px;
            padding: 30px 20px;
            background: linear-gradient(135deg, #4f46e5 0%, #7e5bef 100%);
            color: white;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.3);
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }
        
        .header .subtitle {
            font-size: 1.4rem;
            opacity: 0.9;
        }
        
        .category-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 30px;
            background-color: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.08);
            border: 3px solid #e0e7ff;
            justify-content: center;
        }
        
        .tab-btn {
            padding: 18px 28px;
            background-color: #eef2ff;
            color: #4f46e5;
            border: 3px solid #4f46e5;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1.3rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 180px;
            justify-content: center;
        }
        
        .tab-btn i {
            font-size: 1.5rem;
        }
        
        .tab-btn:hover {
            background-color: #e0e7ff;
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(79, 70, 229, 0.2);
        }
        
        .tab-btn.active {
            background-color: #4f46e5;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(79, 70, 229, 0.3);
            border-bottom: 6px solid #ffd966;
        }
        
        .category-content {
            background: white;
            border-radius: 25px;
            padding: 35px;
            margin-bottom: 30px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.06);
            border: 3px solid #e0e7ff;
            display: none;
        }
        
        .category-content.active {
            display: block;
            animation: fadeIn 0.6s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .category-title {
            font-size: 2rem;
            color: #4f46e5;
            border-bottom: 4px solid #7e5bef;
            padding-bottom: 15px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .category-title i {
            font-size: 2rem;
        }
        
        .flashcards-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            margin: 30px 0;
        }
        
        .flashcard {
            perspective: 1200px;
            height: 500px;
            cursor: pointer;
        }
        
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.8s;
            transform-style: preserve-3d;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
            border-radius: 25px;
        }
        
        .flashcard.flipped .card-inner {
            transform: rotateY(180deg);
        }
        
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .card-front {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            position: relative;
            z-index: 1;
        }
        
        .card-front::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.25);
            z-index: -1;
            border-radius: 25px;
        }
        
        .card-front-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            z-index: 2;
        }
        
        .card-category-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background-color: rgba(255, 255, 255, 0.2);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 1.1rem;
            backdrop-filter: blur(5px);
            z-index: 3;
        }
        
        .card-word {
            font-size: 4rem;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.5);
        }
        
        .card-word-desc {
            font-size: 1.6rem;
            color: rgba(255, 255, 255, 0.95);
            margin-bottom: 25px;
            background-color: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 15px;
        }
        
        .card-example {
            font-size: 1.3rem;
            color: rgba(255, 255, 255, 0.95);
            margin-bottom: 10px;
            text-align: left;
            padding: 5px 15px;
            border-left: 4px solid rgba(255, 255, 255, 0.7);
            background-color: rgba(0, 0, 0, 0.15);
            border-radius: 0 8px 8px 0;
        }
        
        .card-back {
            background: white;
            border: 3px solid #667eea;
            transform: rotateY(180deg);
            padding: 0;
        }
        
        .card-back-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .card-footer {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3;
        }
        
        .audio-btn {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background-color: white;
            color: #667eea;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 2.5rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
            z-index: 10;
        }
        
        .audio-btn:hover {
            background-color: #f0f0f0;
            transform: scale(1.15);
        }
        
        .audio-btn.playing {
            background-color: #ef4444;
            color: white;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 25px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        
        .nav-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 40px 0 20px;
        }
        
        .nav-btn {
            padding: 15px 30px;
            border: 3px solid #4f46e5;
            border-radius: 15px;
            background-color: white;
            color: #4f46e5;
            font-size: 1.3rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .nav-btn:hover:not(:disabled) {
            background-color: #4f46e5;
            color: white;
            transform: translateY(-3px);
        }
        
        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background-color: #e2e8f0;
            border-color: #a0aec0;
            color: #718096;
        }
        
        .page-indicator {
            font-size: 1.5rem;
            font-weight: 600;
            color: #4a5568;
            padding: 15px 25px;
            background-color: #eef2ff;
            border-radius: 15px;
        }
        
        .float-buttons {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 100;
        }
        
        .float-btn {
            background-color: #4f46e5;
            color: white;
            border: none;
            border-radius: 60px;
            padding: 18px 25px;
            font-size: 1.3rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(79, 70, 229, 0.4);
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
            border: 2px solid white;
        }
        
        .float-btn:hover {
            background-color: #7e5bef;
            transform: scale(1.05);
        }
        
        #backToTop {
            background-color: #2d3748;
        }
        
        #backToTop:hover {
            background-color: #4a5568;
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }
        
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #e0e7ff;
            border-top-color: #4f46e5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            font-size: 1.5rem;
            color: #4f46e5;
            font-weight: 600;
        }
        
        .loading-progress {
            margin-top: 10px;
            font-size: 1.2rem;
            color: #718096;
        }
        
        .no-data-message {
            text-align: center;
            padding: 50px;
            color: #718096;
            font-size: 1.5rem;
        }
        
        @media (max-width: 1024px) {
            .flashcards-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
            }
            .flashcard { height: 450px; }
            .card-word { font-size: 3rem; }
        }
        
        @media (max-width: 768px) {
            body { padding: 15px; font-size: 18px; }
            body.ultra-large { font-size: 24px; }
            .header h1 { font-size: 2rem; }
            .flashcards-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .flashcard { height: 400px; }
            .tab-btn { min-width: 150px; padding: 15px 20px; font-size: 1.1rem; }
            .card-word { font-size: 2.5rem; }
            .float-buttons { bottom: 20px; right: 20px; }
            .float-btn { padding: 15px 20px; font-size: 1.1rem; }
            .audio-btn { width: 80px; height: 80px; font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <!-- 加載數據文件 -->
    <script src="data/data.js"></script>
    <script src="data/fruit.js"></script>
    <script src="data/color.js"></script>
    <script src="data/clothing.js"></script>
    <script src="data/toy.js"></script>
    <script src="data/transport.js"></script>
    <script src="data/vintage.js"></script>
    <script src="data/emotion.js"></script>

    <script>
        // 全局變數
        let currentAudio = null;
        let currentPlayingButton = null;
        let currentLanguage = 'cantonese';
        let voiceCache = {
            'zh-CN': null,
            'zh-HK': null
        };
        const CARDS_PER_PAGE = 6;
        
        // 當前頁碼
        let currentPages = {
            fruit: 1,
            color: 1,
            clothing: 1,
            toy: 1,
            transport: 1,
            vintage: 1,
            emotion: 1
        };
        
        // 分類名稱映射
        const categoryNames = {
            fruit: '水果',
            color: '顏色',
            clothing: '服裝',
            toy: '玩具/遊戲',
            transport: '交通工具',
            vintage: '懷舊物品',
            emotion: '情緒'
        };
        
        // ========== 輔助：播放提示音 ==========
        function playClickSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.value = 800;
                gainNode.gain.value = 0.1;
                oscillator.connect(gainNode).connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.1);
                if (audioCtx.state === 'suspended') audioCtx.resume();
            } catch (e) { /* 忽略 */ }
        }

        // ========== 觸控震動 ==========
        function vibrateFeedback() {
            if (navigator.vibrate) navigator.vibrate(20);
        }
        
        // ========== TTS語音選擇 ==========
        function getBestVoice(lang) {
            if (voiceCache[lang]) return voiceCache[lang];
            
            const voices = window.speechSynthesis.getVoices();
            
            if (lang === 'zh-CN') {
                const priorityPatterns = [
                    { name: 'Microsoft Xiaoxiao', lang: 'zh-CN' },
                    { name: 'Xiaoxiao', lang: 'zh-CN' },
                    { name: 'Microsoft Yunxi', lang: 'zh-CN' },
                    { name: 'Yunxi', lang: 'zh-CN' },
                    { name: 'Microsoft Yunyang', lang: 'zh-CN' },
                    { name: 'Yunyang', lang: 'zh-CN' },
                    { name: 'Google 普通话', lang: 'zh-CN' },
                    { name: 'Google', lang: 'zh-CN' },
                    { name: '普通话', lang: 'zh-CN' },
                    { name: '中文', lang: 'zh-CN' }
                ];
                
                for (let pattern of priorityPatterns) {
                    const match = voices.find(v => 
                        v.name.includes(pattern.name) && v.lang === pattern.lang
                    );
                    if (match) {
                        voiceCache[lang] = match;
                        return match;
                    }
                }
            } else if (lang === 'zh-HK') {
                const priorityPatterns = [
                    { name: 'Microsoft HiuGaai', lang: 'zh-HK' },
                    { name: 'HiuGaai', lang: 'zh-HK' },
                    { name: 'Microsoft HiuMaan', lang: 'zh-HK' },
                    { name: 'HiuMaan', lang: 'zh-HK' },
                    { name: 'Google 粵語', lang: 'zh-HK' },
                    { name: 'Google', lang: 'zh-HK' },
                    { name: '廣東話', lang: 'zh-HK' },
                    { name: 'Cantonese', lang: 'zh-HK' }
                ];
                
                for (let pattern of priorityPatterns) {
                    const match = voices.find(v => 
                        v.name.includes(pattern.name) && v.lang === pattern.lang
                    );
                    if (match) {
                        voiceCache[lang] = match;
                        return match;
                    }
                }
            }
            
            const fallback = voices.find(v => v.lang === lang);
            if (fallback) {
                voiceCache[lang] = fallback;
                return fallback;
            }
            
            return null;
        }
        
        // ========== 播放TTS序列 ==========
        function playTTSSequence(word, example1, example2, button) {
            const playQueue = [
                { text: word, type: 'word' },
                { text: word, type: 'word' },
                { text: example1, type: 'example1' },
                { text: example2, type: 'example2' }
            ];
            let currentIndex = 0;
            
            function speakNext() {
                if (currentIndex >= playQueue.length) {
                    button.classList.remove('playing');
                    button.innerHTML = '<i class="fas fa-volume-up"></i>';
                    currentPlayingButton = null;
                    return;
                }
                const item = playQueue[currentIndex];
                const utterance = new SpeechSynthesisUtterance(item.text);
                utterance.lang = currentLanguage === 'cantonese' ? 'zh-HK' : 'zh-CN';
                const best = getBestVoice(utterance.lang);
                if (best) utterance.voice = best;
                utterance.rate = 0.85;
                utterance.pitch = 1;
                utterance.volume = 1;
                
                utterance.onend = () => {
                    currentIndex++;
                    if (currentIndex < playQueue.length) {
                        const delay = (playQueue[currentIndex].type === item.type) ? 800 : 1500;
                        setTimeout(speakNext, delay);
                    } else {
                        setTimeout(() => {
                            button.classList.remove('playing');
                            button.innerHTML = '<i class="fas fa-volume-up"></i>';
                            currentPlayingButton = null;
                        }, 100);
                    }
                };
                utterance.onerror = () => {
                    currentIndex++;
                    setTimeout(speakNext, 100);
                };
                window.speechSynthesis.speak(utterance);
            }
            speakNext();
        }
        
        // ========== 播放音頻 ==========
        function playLocalAudio(audioPath, word, example1, example2, button) {
            playTTSSequence(word, example1, example2, button);
        }
        
        // ========== 停止所有音頻 ==========
        function stopAllAudio() {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
            
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
            }
            
            if (currentPlayingButton) {
                currentPlayingButton.classList.remove('playing');
                currentPlayingButton.innerHTML = '<i class="fas fa-volume-up"></i>';
                currentPlayingButton = null;
            }
        }
        
        // ========== 預加載語音 ==========
        function preloadVoices() {
            if (window.speechSynthesis) {
                window.speechSynthesis.getVoices();
                setTimeout(() => {
                    getBestVoice('zh-HK');
                    getBestVoice('zh-CN');
                }, 500);
            }
        }
        
        // ========== 渲染卡片 ==========
        function renderCards(category, page) {
            const container = document.getElementById(`${category}-cards`);
            if (!container) return;
            
            const cards = window.cardsData[category] || [];
            
            if (cards.length === 0) {
                container.innerHTML = '<div class="no-data-message">此分類暫無卡片數據</div>';
                return;
            }
            
            const totalPages = Math.ceil(cards.length / CARDS_PER_PAGE);
            const startIndex = (page - 1) * CARDS_PER_PAGE;
            const endIndex = Math.min(startIndex + CARDS_PER_PAGE, cards.length);
            const pageCards = cards.slice(startIndex, endIndex);
            
            // 清空容器
            container.innerHTML = '';
            const fragment = document.createDocumentFragment();
            
            pageCards.forEach(card => {
                // 根據語言選取例句
                let ex1, ex2;
                if (currentLanguage === 'cantonese') {
                    ex1 = card.exampleCanto1 || card.example1 || '';
                    ex2 = card.exampleCanto2 || card.example2 || '';
                } else {
                    ex1 = card.exampleMandarin1 || card.example1 || '';
                    ex2 = card.exampleMandarin2 || card.example2 || '';
                }
                
                const audioPath = currentLanguage === 'cantonese' ? card.audioCantonese : card.audioMandarin;
                
                // 創建卡片元素
                const cardDiv = document.createElement('div');
                cardDiv.className = 'flashcard';
                cardDiv.setAttribute('data-category', category);
                cardDiv.setAttribute('data-word', card.word);
                cardDiv.setAttribute('data-example1', ex1);
                cardDiv.setAttribute('data-example2', ex2);
                cardDiv.setAttribute('data-audio', audioPath);
                
                cardDiv.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front">
                            <div class="card-category-badge"><i class="fas fa-tag"></i> ${categoryNames[category]}</div>
                            <div class="card-front-content">
                                <div class="card-word">${card.word}</div>
                                <div class="card-word-desc">${card.desc}</div>
                                <div class="card-example"><i class="fas fa-quote-left"></i> ${ex1}</div>
                                <div class="card-example"><i class="fas fa-quote-right"></i> ${ex2}</div>
                            </div>
                            <div class="card-footer">
                                <button class="audio-btn">
                                    <i class="fas fa-volume-up"></i>
                                </button>
                            </div>
                        </div>
                        <div class="card-back">
                            <img src="${card.img}" alt="${card.word}" class="card-back-image" loading="lazy">
                        </div>
                    </div>
                `;
                
                fragment.appendChild(cardDiv);
            });
            
            container.appendChild(fragment);
            
            // 更新頁碼
            const pageIndicator = document.getElementById(`${category}-page`);
            if (pageIndicator) {
                pageIndicator.textContent = `${page}/${totalPages}`;
            }
            
            // 更新按鈕狀態
            const prevBtn = document.getElementById(`${category}-prev`);
            const nextBtn = document.getElementById(`${category}-next`);
            if (prevBtn) prevBtn.disabled = page <= 1;
            if (nextBtn) nextBtn.disabled = page >= totalPages;
            
            // 綁定事件
            bindEvents();
        }
        
        // ========== 綁定事件 ==========
        function bindEvents() {
            // 卡片翻轉
            document.querySelectorAll('.flashcard').forEach(card => {
                card.removeEventListener('click', card.clickHandler);
                
                card.clickHandler = function(e) {
                    if (!e.target.closest('.audio-btn')) {
                        this.classList.toggle('flipped');
                        playClickSound();
                        vibrateFeedback();
                    }
                };
                
                card.addEventListener('click', card.clickHandler);
            });
            
            // 音頻播放
            document.querySelectorAll('.audio-btn').forEach(btn => {
                btn.removeEventListener('click', btn.clickHandler);
                
                btn.clickHandler = function(e) {
                    e.stopPropagation();
                    
                    const flashcard = this.closest('.flashcard');
                    const word = flashcard.dataset.word;
                    const example1 = flashcard.dataset.example1;
                    const example2 = flashcard.dataset.example2;
                    const audioPath = flashcard.dataset.audio;
                    
                    if (currentPlayingButton === this) {
                        stopAllAudio();
                        return;
                    }
                    
                    stopAllAudio();
                    
                    this.classList.add('playing');
                    this.innerHTML = '<i class="fas fa-pause"></i>';
                    currentPlayingButton = this;
                    
                    playLocalAudio(audioPath, word, example1, example2, this);
                    playClickSound();
                    vibrateFeedback();
                };
                
                btn.addEventListener('click', btn.clickHandler);
            });
        }
        
        // ========== 檢查數據加載 ==========
        function checkDataLoaded() {
            const categories = ['fruit', 'color', 'clothing', 'toy', 'transport', 'vintage', 'emotion'];
            let loadedCount = 0;
            let totalCards = 0;
            
            categories.forEach(cat => {
                if (window.cardsData[cat] && window.cardsData[cat].length > 0) {
                    loadedCount++;
                    totalCards += window.cardsData[cat].length;
                }
            });
            
            document.getElementById('loadingProgress').textContent = `已加載 ${loadedCount}/7 個分類，共 ${totalCards} 張卡片`;
            
            if (loadedCount > 0) {
                setTimeout(() => {
                    document.getElementById('loadingOverlay').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('loadingOverlay').style.display = 'none';
                    }, 500);
                }, 500);
                
                for (let cat of categories) {
                    if (window.cardsData[cat] && window.cardsData[cat].length > 0) {
                        renderCards(cat, 1);
                        break;
                    }
                }
                
                preloadVoices();
            } else {
                setTimeout(checkDataLoaded, 1000);
            }
        }
        
        // ========== 標籤切換 ==========
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const category = this.dataset.category;
                
                stopAllAudio();
                
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                document.querySelectorAll('.category-content').forEach(c => c.classList.remove('active'));
                document.getElementById(`category-${category}`).classList.add('active');
                
                if (window.cardsData[category] && window.cardsData[category].length > 0) {
                    renderCards(category, currentPages[category] || 1);
                }
                
                playClickSound();
                vibrateFeedback();
            });
        });
        
        // ========== 分頁按鈕 ==========
        const categories = ['fruit', 'color', 'clothing', 'toy', 'transport', 'vintage', 'emotion'];
        categories.forEach(category => {
            const prevBtn = document.getElementById(`${category}-prev`);
            const nextBtn = document.getElementById(`${category}-next`);
            
            if (prevBtn) {
                prevBtn.addEventListener('click', () => {
                    stopAllAudio();
                    
                    if (currentPages[category] > 1) {
                        currentPages[category]--;
                        renderCards(category, currentPages[category]);
                        playClickSound();
                        vibrateFeedback();
                    }
                });
            }
            
            if (nextBtn) {
                nextBtn.addEventListener('click', () => {
                    stopAllAudio();
                    
                    const cards = window.cardsData[category] || [];
                    const totalPages = Math.ceil(cards.length / CARDS_PER_PAGE);
                    if (currentPages[category] < totalPages) {
                        currentPages[category]++;
                        renderCards(category, currentPages[category]);
                        playClickSound();
                        vibrateFeedback();
                    }
                });
            }
        });
        
        // ========== 字體放大切換 ==========
        document.getElementById('fontSizeToggle').addEventListener('click', function() {
            document.body.classList.toggle('ultra-large');
            const span = this.querySelector('span');
            span.textContent = document.body.classList.contains('ultra-large') ? '標準字體' : '放大字體';
            playClickSound();
            vibrateFeedback();
        });
        
        // ========== 語言切換 ==========
        document.getElementById('langToggle').addEventListener('click', function() {
            stopAllAudio();
            
            currentLanguage = currentLanguage === 'cantonese' ? 'mandarin' : 'cantonese';
            this.querySelector('span').textContent = currentLanguage === 'cantonese' ? '切換至普通話' : '切換至粵語';
            
            const activeCategory = document.querySelector('.tab-btn.active')?.dataset.category;
            if (activeCategory && window.cardsData[activeCategory]) {
                renderCards(activeCategory, currentPages[activeCategory] || 1);
            }
            
            playClickSound();
            vibrateFeedback();
        });
        
        // ========== 返回頂部 ==========
        document.getElementById('backToTop').addEventListener('click', function() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            playClickSound();
            vibrateFeedback();
        });
        
        // ========== 語音列表更新 ==========
        window.speechSynthesis.onvoiceschanged = function() {
            voiceCache = {
                'zh-CN': null,
                'zh-HK': null
            };
            getBestVoice('zh-HK');
            getBestVoice('zh-CN');
        };
        
        // 開始檢查數據
        setTimeout(checkDataLoaded, 500);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>懷舊記憶卡 - 給香港長者的認知訓練</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft JhengHei', 'Noto Sans TC', sans-serif;
        }
        
        body {
            background-color: #f0f4fa;
            color: #2d3748;
            line-height: 1.6;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
            font-size: 22px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 25px;
            padding: 30px 20px;
            background: linear-gradient(135deg, #4f46e5 0%, #7e5bef 100%);
            color: white;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.3);
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }
        
        .header .subtitle {
            font-size: 1.4rem;
            opacity: 0.9;
        }
        
        .category-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 30px;
            background-color: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.08);
            border: 3px solid #e0e7ff;
            justify-content: center;
        }
        
        .tab-btn {
            padding: 18px 28px;
            background-color: #eef2ff;
            color: #4f46e5;
            border: 3px solid #4f46e5;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1.3rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 180px;
            justify-content: center;
        }
        
        .tab-btn i {
            font-size: 1.5rem;
        }
        
        .tab-btn:hover {
            background-color: #e0e7ff;
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(79, 70, 229, 0.2);
        }
        
        .tab-btn.active {
            background-color: #4f46e5;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(79, 70, 229, 0.3);
        }
        
        .category-content {
            background: white;
            border-radius: 25px;
            padding: 35px;
            margin-bottom: 30px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.06);
            border: 3px solid #e0e7ff;
            display: none;
        }
        
        .category-content.active {
            display: block;
            animation: fadeIn 0.6s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .category-title {
            font-size: 2rem;
            color: #4f46e5;
            border-bottom: 4px solid #7e5bef;
            padding-bottom: 15px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .category-title i {
            font-size: 2rem;
        }
        
        /* 恢復原來的閃卡網格 - 每行2列 */
        .flashcards-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            margin: 30px 0;
        }
        
        /* 恢復原來的卡片高度，圖片更大 */
        .flashcard {
            perspective: 1200px;
            height: 500px;
            cursor: pointer;
        }
        
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.8s;
            transform-style: preserve-3d;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
            border-radius: 25px;
        }
        
        .flashcard.flipped .card-inner {
            transform: rotateY(180deg);
        }
        
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .card-front {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
        }
        
        .card-front-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .card-category-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background-color: rgba(255, 255, 255, 0.2);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 1.1rem;
            backdrop-filter: blur(5px);
        }
        
        .card-word {
            font-size: 4rem;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.3);
        }
        
        .card-word-desc {
            font-size: 1.6rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 25px;
            background-color: rgba(255, 255, 255, 0.15);
            padding: 15px;
            border-radius: 15px;
        }
        
        .card-example {
            font-size: 1.3rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 10px;
            text-align: left;
            padding: 5px 15px;
            border-left: 4px solid rgba(255, 255, 255, 0.5);
        }
        
        .card-back {
            background: white;
            border: 3px solid #667eea;
            transform: rotateY(180deg);
            padding: 0;
        }
        
        .card-back-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .card-footer {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* 加大播放按鈕尺寸 */
        .audio-btn {
            width: 90px;      /* 從70px加大到90px */
            height: 90px;      /* 從70px加大到90px */
            border-radius: 50%;
            background-color: white;
            color: #667eea;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 2.5rem;  /* 從2rem加大到2.5rem */
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
            z-index: 10;
        }
        
        .audio-btn:hover {
            background-color: #f0f0f0;
            transform: scale(1.15);
        }
        
        .audio-btn.playing {
            background-color: #ef4444;
            color: white;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 25px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        
        .nav-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 40px 0 20px;
        }
        
        .nav-btn {
            padding: 15px 30px;
            border: 3px solid #4f46e5;
            border-radius: 15px;
            background-color: white;
            color: #4f46e5;
            font-size: 1.3rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .nav-btn:hover:not(:disabled) {
            background-color: #4f46e5;
            color: white;
            transform: translateY(-3px);
        }
        
        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background-color: #e2e8f0;
            border-color: #a0aec0;
            color: #718096;
        }
        
        .page-indicator {
            font-size: 1.5rem;
            font-weight: 600;
            color: #4a5568;
            padding: 15px 25px;
            background-color: #eef2ff;
            border-radius: 15px;
        }
        
        .lang-toggle {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #4f46e5;
            color: white;
            border: none;
            border-radius: 60px;
            padding: 18px 30px;
            font-size: 1.3rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(79, 70, 229, 0.4);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 100;
            transition: all 0.3s ease;
        }
        
        .lang-toggle:hover {
            background-color: #7e5bef;
            transform: scale(1.05);
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }
        
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #e0e7ff;
            border-top-color: #4f46e5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            font-size: 1.5rem;
            color: #4f46e5;
            font-weight: 600;
        }
        
        .loading-progress {
            margin-top: 10px;
            font-size: 1.2rem;
            color: #718096;
        }
        
        .no-data-message {
            text-align: center;
            padding: 50px;
            color: #718096;
            font-size: 1.5rem;
        }
        
        /* 響應式設計 */
        @media (max-width: 1024px) {
            .flashcards-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
            }
            .flashcard { height: 450px; }
            .card-word { font-size: 3rem; }
        }
        
        @media (max-width: 768px) {
            body { padding: 15px; font-size: 18px; }
            .header h1 { font-size: 2rem; }
            .flashcards-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .flashcard { height: 400px; }
            .tab-btn { min-width: 150px; padding: 15px 20px; font-size: 1.1rem; }
            .card-word { font-size: 2.5rem; }
            .lang-toggle { bottom: 20px; right: 20px; padding: 15px 25px; }
            .audio-btn { width: 80px; height: 80px; font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <!-- 加載數據文件 -->
    <script src="data/data.js"></script>
    <script src="data/fruit.js"></script>
    <script src="data/color.js"></script>
    <script src="data/clothing.js"></script>
    <script src="data/toy.js"></script>
    <script src="data/transport.js"></script>
    <script src="data/vintage.js"></script>
    <script src="data/emotion.js"></script>

    <script>
        // 全局變數
        let currentAudio = null;
        let currentPlayingButton = null;
        let currentLanguage = 'cantonese';  // 預設為粵語
        let voiceCache = {
            'zh-CN': null,
            'zh-HK': null
        };
        const CARDS_PER_PAGE = 6;  // 每頁6張卡片
        
        // 當前頁碼
        let currentPages = {
            fruit: 1,
            color: 1,
            clothing: 1,
            toy: 1,
            transport: 1,
            vintage: 1,
            emotion: 1
        };
        
        // 分類名稱映射
        const categoryNames = {
            fruit: '水果',
            color: '顏色',
            clothing: '服裝',
            toy: '玩具/遊戲',
            transport: '交通工具',
            vintage: '懷舊物品',
            emotion: '情緒'
        };
        
        // ========== 改良版TTS語音選擇 ==========
        function getBestVoice(lang) {
            // 如果已經快取，直接返回
            if (voiceCache[lang]) return voiceCache[lang];
            
            const voices = window.speechSynthesis.getVoices();
            console.log('可用語音:', voices.map(v => `${v.name} (${v.lang})`));
            
            if (lang === 'zh-CN') {
                // 普通話語音優先級（由高到低）
                const priorityPatterns = [
                    { name: 'Microsoft Xiaoxiao', lang: 'zh-CN' },  // 微軟曉曉（最自然）
                    { name: 'Xiaoxiao', lang: 'zh-CN' },
                    { name: 'Microsoft Yunxi', lang: 'zh-CN' },     // 微軟雲希（男聲）
                    { name: 'Yunxi', lang: 'zh-CN' },
                    { name: 'Microsoft Yunyang', lang: 'zh-CN' },   // 微軟雲揚
                    { name: 'Yunyang', lang: 'zh-CN' },
                    { name: 'Google 普通话', lang: 'zh-CN' },        // Google
                    { name: 'Google', lang: 'zh-CN' },
                    { name: '普通话', lang: 'zh-CN' },               // 系統普通話
                    { name: '中文', lang: 'zh-CN' }                  // 備選
                ];
                
                for (let pattern of priorityPatterns) {
                    const match = voices.find(v => 
                        v.name.includes(pattern.name) && v.lang === pattern.lang
                    );
                    if (match) {
                        console.log('選擇普通話語音:', match.name);
                        voiceCache[lang] = match;
                        return match;
                    }
                }
            } else if (lang === 'zh-HK') {
                // 粵語語音優先級
                const priorityPatterns = [
                    { name: 'Microsoft HiuGaai', lang: 'zh-HK' },   // 微軟曉佳（香港）
                    { name: 'HiuGaai', lang: 'zh-HK' },
                    { name: 'Microsoft HiuMaan', lang: 'zh-HK' },   // 微軟曉曼
                    { name: 'HiuMaan', lang: 'zh-HK' },
                    { name: 'Google 粵語', lang: 'zh-HK' },
                    { name: 'Google', lang: 'zh-HK' },
                    { name: '廣東話', lang: 'zh-HK' },
                    { name: 'Cantonese', lang: 'zh-HK' }
                ];
                
                for (let pattern of priorityPatterns) {
                    const match = voices.find(v => 
                        v.name.includes(pattern.name) && v.lang === pattern.lang
                    );
                    if (match) {
                        console.log('選擇粵語語音:', match.name);
                        voiceCache[lang] = match;
                        return match;
                    }
                }
            }
            
            // 備選：任何匹配語言的語音
            const fallback = voices.find(v => v.lang === lang);
            if (fallback) {
                console.log('使用備選語音:', fallback.name);
                voiceCache[lang] = fallback;
                return fallback;
            }
            
            return null;
        }
        
        // ========== 改良版TTS播放 ==========
        function playTTSSequence(word, example1, example2, button) {
            let step = 0;
            // 播放順序：名詞2次，例句1一次，例句2一次
            const playSteps = [
                { type: 'word', text: word, repeat: 2 },        // 名詞讀2次
                { type: 'example1', text: example1, repeat: 1 }, // 例句1讀1次
                { type: 'example2', text: example2, repeat: 1 }  // 例句2讀1次
            ];
            
            let currentStepIndex = 0;
            let currentRepeatCount = 0;
            
            function speakNext() {
                if (currentStepIndex >= playSteps.length) {
                    // 全部播放完畢
                    button.classList.remove('playing');
                    button.innerHTML = '<i class="fas fa-volume-up"></i>';
                    currentPlayingButton = null;
                    return;
                }
                
                const step = playSteps[currentStepIndex];
                
                const utterance = new SpeechSynthesisUtterance(step.text);
                
                // 設置語言和語音
                if (currentLanguage === 'cantonese') {
                    utterance.lang = 'zh-HK';
                    const bestVoice = getBestVoice('zh-HK');
                    if (bestVoice) utterance.voice = bestVoice;
                } else {
                    utterance.lang = 'zh-CN';
                    const bestVoice = getBestVoice('zh-CN');
                    if (bestVoice) utterance.voice = bestVoice;
                }
                
                // 設置語速較慢，適合長者
                utterance.rate = 0.9;
                utterance.pitch = 1;
                utterance.volume = 1;
                
                utterance.onend = function() {
                    currentRepeatCount++;
                    
                    if (currentRepeatCount < step.repeat) {
                        // 同一句需要重複，間隔0.8秒
                        setTimeout(speakNext, 800);
                    } else {
                        // 進入下一句
                        currentStepIndex++;
                        currentRepeatCount = 0;
                        
                        if (currentStepIndex < playSteps.length) {
                            // 不同句之間間隔1.5秒
                            setTimeout(speakNext, 1500);
                        } else {
                            // 全部播放完畢
                            setTimeout(() => {
                                button.classList.remove('playing');
                                button.innerHTML = '<i class="fas fa-volume-up"></i>';
                                currentPlayingButton = null;
                            }, 100);
                        }
                    }
                };
                
                utterance.onerror = function() {
                    console.log('TTS錯誤，跳過此句');
                    currentStepIndex++;
                    currentRepeatCount = 0;
                    setTimeout(speakNext, 100);
                };
                
                window.speechSynthesis.speak(utterance);
            }
            
            speakNext();
        }
        
        // ========== 播放本地音頻 ==========
        function playLocalAudio(audioPath, word, example1, example2, button) {
            try {
                currentAudio = new Audio(audioPath);
                
                currentAudio.onended = function() {
                    currentAudio = null;
                    button.classList.remove('playing');
                    button.innerHTML = '<i class="fas fa-volume-up"></i>';
                    currentPlayingButton = null;
                };
                
                currentAudio.onerror = function() {
                    console.log('本地音頻播放失敗，改用 TTS');
                    currentAudio = null;
                    playTTSSequence(word, example1, example2, button);
                };
                
                currentAudio.play().catch(error => {
                    console.log('本地音頻播放錯誤:', error);
                    currentAudio = null;
                    playTTSSequence(word, example1, example2, button);
                });
                
            } catch (error) {
                console.log('本地音頻初始化錯誤:', error);
                playTTSSequence(word, example1, example2, button);
            }
        }
        
        // ========== 停止所有音頻 ==========
        function stopAllAudio() {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
            
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
            }
            
            if (currentPlayingButton) {
                currentPlayingButton.classList.remove('playing');
                currentPlayingButton.innerHTML = '<i class="fas fa-volume-up"></i>';
                currentPlayingButton = null;
            }
        }
        
        // ========== 檢查數據加載狀態 ==========
        function checkDataLoaded() {
            const categories = ['fruit', 'color', 'clothing', 'toy', 'transport', 'vintage', 'emotion'];
            let loadedCount = 0;
            let totalCards = 0;
            
            categories.forEach(cat => {
                if (window.cardsData[cat] && window.cardsData[cat].length > 0) {
                    loadedCount++;
                    totalCards += window.cardsData[cat].length;
                }
            });
            
            document.getElementById('loadingProgress').textContent = `已加載 ${loadedCount}/7 個分類，共 ${totalCards} 張卡片`;
            console.log(`已加載 ${loadedCount}/7 個分類，共 ${totalCards} 張卡片`);
            
            if (loadedCount > 0) {
                setTimeout(() => {
                    document.getElementById('loadingOverlay').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('loadingOverlay').style.display = 'none';
                    }, 500);
                }, 500);
                
                // 初始化第一個有數據的分類
                for (let cat of categories) {
                    if (window.cardsData[cat] && window.cardsData[cat].length > 0) {
                        renderCards(cat, 1);
                        break;
                    }
                }
            } else {
                setTimeout(checkDataLoaded, 1000);
            }
        }
        
        // ========== 渲染卡片 ==========
        function renderCards(category, page) {
            const container = document.getElementById(`${category}-cards`);
            if (!container) return;
            
            const cards = window.cardsData[category] || [];
            
            if (cards.length === 0) {
                container.innerHTML = '<div class="no-data-message">此分類暫無卡片數據</div>';
                return;
            }
            
            const totalPages = Math.ceil(cards.length / CARDS_PER_PAGE);
            const startIndex = (page - 1) * CARDS_PER_PAGE;
            const endIndex = Math.min(startIndex + CARDS_PER_PAGE, cards.length);
            const pageCards = cards.slice(startIndex, endIndex);
            
            container.innerHTML = '';
            
            pageCards.forEach(card => {
                const audioPath = currentLanguage === 'cantonese' ? card.audioCantonese : card.audioMandarin;
                
                const cardHtml = `
                    <div class="flashcard" data-category="${category}" 
                         data-word="${card.word}" 
                         data-example1="${card.example1}" 
                         data-example2="${card.example2}"
                         data-audio="${audioPath}">
                        <div class="card-inner">
                            <div class="card-front">
                                <div class="card-category-badge"><i class="fas fa-tag"></i> ${categoryNames[category]}</div>
                                <div class="card-front-content">
                                    <div class="card-word">${card.word}</div>
                                    <div class="card-word-desc">${card.desc}</div>
                                    <div class="card-example"><i class="fas fa-quote-left"></i> ${card.example1}</div>
                                    <div class="card-example"><i class="fas fa-quote-right"></i> ${card.example2}</div>
                                </div>
                                <div class="card-footer">
                                    <button class="audio-btn">
                                        <i class="fas fa-volume-up"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="card-back">
                                <img src="${card.img}" alt="${card.word}" class="card-back-image" onerror="this.src='images/placeholder.png'">
                            </div>
                        </div>
                    </div>
                `;
                
                container.innerHTML += cardHtml;
            });
            
            // 更新頁碼
            const pageIndicator = document.getElementById(`${category}-page`);
            if (pageIndicator) {
                pageIndicator.textContent = `${page}/${totalPages}`;
            }
            
            // 更新按鈕狀態
            const prevBtn = document.getElementById(`${category}-prev`);
            const nextBtn = document.getElementById(`${category}-next`);
            if (prevBtn) prevBtn.disabled = page <= 1;
            if (nextBtn) nextBtn.disabled = page >= totalPages;
            
            // 綁定事件
            bindEvents();
        }
        
        // ========== 綁定事件 ==========
        function bindEvents() {
            // 卡片翻轉
            document.querySelectorAll('.flashcard').forEach(card => {
                card.addEventListener('click', function(e) {
                    if (!e.target.closest('.audio-btn')) {
                        this.classList.toggle('flipped');
                    }
                });
            });
            
            // 音頻播放
            document.querySelectorAll('.audio-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    
                    const flashcard = this.closest('.flashcard');
                    const word = flashcard.dataset.word;
                    const example1 = flashcard.dataset.example1;
                    const example2 = flashcard.dataset.example2;
                    const audioPath = flashcard.dataset.audio;
                    
                    if (currentPlayingButton === this) {
                        stopAllAudio();
                        return;
                    }
                    
                    stopAllAudio();
                    
                    this.classList.add('playing');
                    this.innerHTML = '<i class="fas fa-pause"></i>';
                    currentPlayingButton = this;
                    
                    // 嘗試播放本地音頻
                    playLocalAudio(audioPath, word, example1, example2, this);
                });
            });
        }
        
        // ========== 標籤切換 ==========
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const category = this.dataset.category;
                
                stopAllAudio();
                
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                document.querySelectorAll('.category-content').forEach(c => c.classList.remove('active'));
                document.getElementById(`category-${category}`).classList.add('active');
                
                if (window.cardsData[category] && window.cardsData[category].length > 0) {
                    renderCards(category, currentPages[category] || 1);
                }
            });
        });
        
        // ========== 分頁按鈕 ==========
        const categories = ['fruit', 'color', 'clothing', 'toy', 'transport', 'vintage', 'emotion'];
        categories.forEach(category => {
            const prevBtn = document.getElementById(`${category}-prev`);
            const nextBtn = document.getElementById(`${category}-next`);
            
            if (prevBtn) {
                prevBtn.addEventListener('click', () => {
                    stopAllAudio();
                    
                    if (currentPages[category] > 1) {
                        currentPages[category]--;
                        renderCards(category, currentPages[category]);
                    }
                });
            }
            
            if (nextBtn) {
                nextBtn.addEventListener('click', () => {
                    stopAllAudio();
                    
                    const cards = window.cardsData[category] || [];
                    const totalPages = Math.ceil(cards.length / CARDS_PER_PAGE);
                    if (currentPages[category] < totalPages) {
                        currentPages[category]++;
                        renderCards(category, currentPages[category]);
                    }
                });
            }
        });
        
        // ========== 語言切換 ==========
        document.getElementById('langToggle').addEventListener('click', function() {
            stopAllAudio();
            
            currentLanguage = currentLanguage === 'cantonese' ? 'mandarin' : 'cantonese';
            this.querySelector('span').textContent = currentLanguage === 'cantonese' ? '切換至普通話' : '切換至粵語';
            
            const activeCategory = document.querySelector('.tab-btn.active')?.dataset.category;
            if (activeCategory && window.cardsData[activeCategory]) {
                renderCards(activeCategory, currentPages[activeCategory] || 1);
            }
        });
        
        // ========== 預加載語音列表 ==========
        window.speechSynthesis.onvoiceschanged = function() {
            // 清空快取，讓下次選擇時重新獲取
            voiceCache = {
                'zh-CN': null,
                'zh-HK': null
            };
            console.log('語音列表已更新');
        };
        
        // 開始檢查數據
        setTimeout(checkDataLoaded, 500);
    </script>
</body>
</html>
